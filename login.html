<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>
    <link rel="icon" href="assets/icons/svg/moodhere-fabicon.ico" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/login.css" />
    <script src="js/pages/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <main class="container">
        <div class="login-page-wrap">
          <!-- 로고 -->
          <div class="logo-wrap">
            <div class="logo-column bounce">
              <img src="assets/icons/svg/logo-column.svg" alt="" />
            </div>
          </div>
          <!-- 로그인, 비밀번호 인풋 -->
          <div class="login-content-side">
            <div class="login-form-wrap login-shell">
              <form action="login" method="post">
                <div class="login-box">
                  <input
                    type="text"
                    name="id"
                    placeholder="아이디"
                    required
                    class="home-login-id"
                  />
                  <input
                    type="password"
                    name="password"
                    placeholder="비밀번호"
                    required
                    class="home-login-pw"
                  />
                  <a href="home.html" class="btn">
                    <span class="login-text">로그인</span>
                  </a>
                </div>
              </form>
            </div>
            <!-- sns 로그인 -->
            <div class="sns-divider">
              <span class="sns-divider-text">SNS로 로그인하기</span>
            </div>

            <div class="sns-login-wrap">
              <a href="">
                <div class="kakao sns">
                  <img src="assets/icons/kakao-login.png" alt="" />카카오로
                  로그인
                </div>
              </a>
              <a href="">
                <div class="naver sns">
                  <img src="assets/icons/naver-login.png" alt="" />네이버로
                  로그인
                </div>
              </a>
              <a href="">
                <div class="google sns">
                  <img src="assets/icons/google-login.png" alt="" />구글로
                  로그인
                </div>
              </a>
            </div>
            <div class="move-signup">
              <p class="sns-divider-text">계정이 없으신가요?</p>
              <a href="signup.html" class="signup-text">회원가입</a>
            </div>
          </div>
        </div>
      </main>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
