<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>온보딩</title>

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/onboarding.css" />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="swiper onboarding-swiper">
        <div class="swiper-wrapper">
          <div class="swiper-slide">
            <div class="onboard-1">
              <div class="gif-wrap">
                <div class="gif-img">
                  <img src="assets/gif/onboarding-1.gif" alt="" />
                </div>
                <div class="intro">
                  <div class="text">
                    <h2>지금 장소에서 느낀 <br />기분과 감정을 기록해보세요</h2>
                  </div>
                  <div class="sub-text">그날, 그 장소의 감정을 기록하세요</div>
                </div>
              </div>
            </div>
          </div>
          <div class="swiper-slide">
            <div class="onboard-1">
              <div class="gif-wrap">
                <div class="gif-img">
                  <img src="assets/gif/onboarding-2.gif" alt="" />
                </div>
                <div class="intro">
                  <div class="text 1">
                    <h2>지도 위에 기록한<br />감정이 남겨집니다</h2>
                  </div>
                  <div class="sub-text 1">
                    그날, 그 장소의 감정을 기록하세요
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- 온보딩-3 -->
          <div class="swiper-slide">
            <div class="onboard-1">
              <div class="gif-wrap">
                <div class="gif-img">
                  <video autoplay muted loop playsinline>
                    <source
                      src="assets/gif/onboarding-1.mp4"
                      type="video/mp4"
                    />
                  </video>
                </div>
                <div class="intro">
                  <div class="text 1">
                    <h2>지도 위에 기록한<br />감정이 남겨집니다</h2>
                  </div>
                  <div class="sub-text 1">
                    그날, 그 장소의 감정을 기록하세요
                  </div>
                </div>
              </div>
            </div>
          </div>
          <!-- 온보딩-4 -->
          <div class="swiper-slide">
            <div class="onboard-1">
              <div class="gif-wrap">
                <div class="gif-img">
                  <img src="assets/gif/onboarding-2.gif" alt="" />
                </div>
                <div class="intro">
                  <div class="text 1">
                    <h2>
                      지금 무드히어와 함께 <br />나의 감정을 기록해보세요!
                    </h2>
                  </div>
                  <div class="sub-text 1">
                    그날, 그 장소의 감정을 기록하세요
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="swiper-pagination"></div>
      </div>
      <div class="button">
        <a href="login.html" class="btn">시작하기</a>
      </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
