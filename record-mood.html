<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <div class="header-container">
          <a href="home.html">
            <div class="logo">
              <img src="assets/icons/header-logo.svg" alt="" />
            </div>
          </a>
          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <img src="assets/icons/search.png" alt="" /></div
            ></a>
            <a href=""><img src="assets/icons/alram.png" alt="" /></a>
          </div>
        </div>
      </header>
      <main class="container">
        <!-- 배너 부분 -->
        <div class="home-container">
          <div class="banner-swiper-wrap">
            <div class="swiper banner-swiper">
              <div class="swiper-wrapper home-banner">
                <div class="swiper-slide">
                  <h2 class="banner-title">
                    좋았던 기억의 장소를 <br />
                    다른 사용자들에게 추천해보세요
                  </h2>
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
                <div class="swiper-slide">
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
                <div class="swiper-slide">
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
              </div>
              <!-- <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div> -->
              <div class="swiper-pagination"></div>
            </div>
          </div>
          <section class="record-mood-container">
            <div class="mood-archive-btn" id="moodArchiveBtn">
              <div class="mood-archive-text btn-text">
                <p class="title">무드 아카이브</p>
                <p class="sub-title">내가 기록했던 장소의 감정을 모아보세요</p>
              </div>
              <div class="card-container" id="cardAnimation">
                <img
                  src="assets/icons/mood-archive-card-3.svg"
                  alt=""
                  class="card card3"
                />
                <img
                  src="assets/icons/mood-archive-card-2.svg"
                  alt=""
                  class="card card2"
                />
                <img
                  src="assets/icons/mood-archive-card-1.svg"
                  alt=""
                  class="card card1"
                />
              </div>
            </div>
            <div class="mood-record-btn">
              <div class="mood-archive-text btn-text">
                <p class="title">무드 기록하기</p>
                <p class="sub-title">
                  지금 장소에서 느낀 감정을 자유롭게 적어보세요
                </p>
                <div class="mood-record-img">
                  <img src="assets/icons/feel-peace.svg" alt="" />
                  <img src="assets/icons/feel-happy.svg" alt="" />
                  <img src="assets/icons/mood-charater.svg" alt="" />
                </div>
              </div>
              <div class="card-container" id="cardAnimation"></div>
            </div>
          </section>
          <section class="recommend-place-container">
            <div class="place-title-top">
              <h3 class="title">주변 추천 플레이스</h3>
              <a href="/recommend-place.html"
                ><i class="fa-solid fa-angle-right"></i
              ></a>
            </div>
            <div class="place-title-botom">
              <span class="sub-title"
                >다른 사람들이 남긴 장소와 감정을 공유해보세요
              </span>
            </div>
            <div class="place-preview"></div>
          </section>
          <div class="mood-community"></div>

          <!-- <button class="btn">로그인 하기</button> -->
        </div>
      </main>
      <footer class="footer"></footer>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
