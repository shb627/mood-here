<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/record-mood.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=c363676500da135bbb227b2613ea7977&libraries=services&autoload=false"></script>
    <script src="js/record-mood.js" defer></script>
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <div class="header-contents">
          <div type="button" class="back-btn" id="backBtn">
            <i class="fa-solid fa-angle-left"></i>
          </div>
          <div class="header-title">
            <p>무드 기록하기</p>
          </div>
          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <i class="fa-solid fa-magnifying-glass"></i></div
            ></a>
            <a href=""><i class="fa-regular fa-bell"></i></a>
          </div>
        </div>
      </div>
      <!-- 무드 기록 -->
      <section class="record-mood">
        <div class="container">
          <div class="record-title">
            <p class="title">무드 선택하기</p>
          </div>
          <div class="choose-mood-container">
            <div class="choose-mood-box">
              <div class="choose-mood active">
                <img src="assets/icons/svg/happy.svg" alt="" />
              </div>
              <div class="choose-mood">
                <img src="assets/icons/svg/peace.svg" alt="" />
              </div>
              <div class="choose-mood">
                <img src="assets/icons/svg/calm.svg" alt="" />
              </div>
              <div class="choose-mood">
                <img src="assets/icons/svg/sad.svg" alt="" />
              </div>
              <div class="choose-mood">
                <img src="assets/icons/svg/angry.svg" alt="" />
              </div>
            </div>
          </div>
          <!-- 무드기록창 -->
          <div class="input-box">
            <label for="moodText" class="input-label"
              >지금 장소에서 느낌 감정을 남겨보세요
            </label>

            <textarea
              id="moodText"
              class="typing-area"
              placeholder="이 장소에서 느낀 감정을 기록해보세요."
            ></textarea>
          </div>

          <!-- 주소 검색 -->
          <div class="place-search-wrap">
            <span>현재 장소를 추가하세요!</span>
            <input type="text" id="keyword" placeholder="장소명을 검색하세요" />

            <button id="searchBtn">검색</button>

            <ul id="placeList"></ul>

            <div class="selected-place">
              <p id="placeName">선택된 장소 없음</p>
              <span id="placeAddress"></span>
            </div>
          </div>

          <div class="photo-section">
            <div class="photo-header">
              <div class="photo-text-top">
                <h3>사진 첨부 <span>(선택)</span></h3>
              </div>
              <div class="photo-text-bottom">
                <p>
                  사진 최대 6개까지 업로드 가능<br />
                  (사진 1개당 10MB 이하)
                </p>
                <label for="photoInput" class="photo-add-btn">
                  <img src="assets/icons/svg/add_photo.svg" alt="" />
                  <p>사진 추가</p>
                </label>

                <input
                  type="file"
                  id="photoInput"
                  accept="image/*"
                  multiple
                  hidden
                />
              </div>
            </div>

            <div class="photo-grid" id="photoGrid">
              <div class="photo-box"></div>
              <div class="photo-box"></div>
              <div class="photo-box"></div>
              <div class="photo-box"></div>
              <div class="photo-box"></div>
              <div class="photo-box"></div>
            </div>
          </div>

          <div class="date-text"></div>
        </div>
      </section>
      <div class="bottom-nav">
        <div class="bottom-nav-container">
          <a href="/home.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-home.svg" alt="홈 비활성화" />
              <span>홈</span>
            </div>
          </a>
          <a href="/mood-music.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-music.svg"
                alt="무드뮤직 비활성화"
              />
              <span>무드뮤직</span>
            </div>
          </a>
          <a href="/record-mood.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-record.svg"
                alt="무드기록 비활성화"
              />
              <span>무드기록</span>
            </div>
          </a>
          <a href="/mood-archive.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-archive.svg"
                alt="아카이브 비활성화"
              />
              <span>아카이브</span>
            </div>
          </a>
          <a href="/mypage.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-mypage.svg"
                alt="마이페이지 비활성화"
              />
              <span class="nav-text">마이페이지</span>
            </div>
          </a>
        </div>
      </div>
      <footer class="footer"></footer>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <!-- <script src="app.js"></script> -->
  </body>
</html>
