<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="layout">
      <main class="container">
        <wrap class="wrap-column">
          <div class="login-content-side">
            <div class="login-form-wrap">
              <div class="before">
                <i class="fa-solid fa-angle-left"></i>
              </div>
              <div class="page-title">
                <h2>계정 만들기</h2>
              </div>
              <div class="signup-title">
                <p>아이디 <span>*</span></p>
                <input
                  type="text"
                  placeholder="아이디를 입력해주세요"
                  class="signup"
                />
              </div>

              <div class="signup-title">
                <p>비밀번호 *</p>
                <input
                  type="password"
                  placeholder="영문, 숫자, 특수문자 조합 8자리 이상"
                  class="signup"
                />
              </div>

              <div class="signup-title">
                <p>비밀번호 확인 *</p>
                <input type="password" placeholder="" class="signup" id="pw" />
                <!-- <input
                  type="password"
                  placeholder=""
                  class="signup"
                  id="pw-error"
                />
-->
                <span class="error-msg" id="pw-error"
                  >비밀번호가 일치하지 않습니다</span
                >
              </div>

              <div class="signup-title">
                <p>이름 *</p>
                <input
                  type="text"
                  placeholder="이름을 입력해주세요"
                  class="signup"
                />
              </div>

              <div class="signup-title">
                <p>전화번호 *</p>
                <div class="tel-wrap">
                  <input
                    type="tel"
                    placeholder='"-" 없이 번호만 입력'
                    class="tel"
                  />
                  <div class="btn authnum" id="auth">인증번호 받기</div>
                  <!-- <div class="btn authnum" id="reAuth">재발송</div>
                  <div class="btn authnum" id="completeAuth">인증완료</div> -->
                </div>
              </div>
            </div>
          </div>
        </wrap>
      </main>
    </div>
  </body>
</html>
