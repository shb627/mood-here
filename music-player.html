<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mood Music Player</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --green-dark: #1a472a;
        --green-mid: #2d6a4f;
        --green-bright: #40c057;
        --green-light: #b2f2bb;
        --cream: #fdf8f0;
        --brown: #6b3a2a;
        --text: #1a1a1a;
        --muted: #888;
      }

      body {
        font-family: "Noto Sans KR", sans-serif;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .phone {
        width: 360px;
        background: white;
        border-radius: 36px;
        overflow: hidden;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.25);
        position: relative;
      }

      /* Status bar */
      .status-bar {
        background: white;
        padding: 12px 24px 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
      }

      /* Nav bar */
      .nav-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 20px 12px;
        background: white;
      }
      .nav-bar .back {
        font-size: 20px;
        cursor: pointer;
        color: var(--text);
      }
      .nav-bar .title {
        font-size: 16px;
        font-weight: 700;
      }
      .nav-bar .icons {
        display: flex;
        gap: 14px;
        font-size: 18px;
      }

      /* Album Art */
      .album-section {
        padding: 20px 32px 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .album-art {
        width: 280px;
        height: 200px;
        border-radius: 16px;
        background: linear-gradient(
          135deg,
          #6b2c1a 0%,
          #c47d1a 50%,
          #f0a500 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        box-shadow: 0 12px 40px rgba(107, 44, 26, 0.35);
        transition: transform 0.3s ease;
      }

      .album-art:hover {
        transform: scale(1.02);
      }

      .album-art .flower {
        position: absolute;
        font-size: 130px;
        bottom: -20px;
        right: -10px;
        opacity: 0.6;
        filter: saturate(1.5);
      }

      .album-art .album-title {
        font-family: "Playfair Display", serif;
        font-size: 28px;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.95);
        text-align: center;
        line-height: 1.2;
        z-index: 1;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        letter-spacing: 1px;
      }

      /* Spinning indicator when playing */
      .vinyl-ring {
        position: absolute;
        width: 60px;
        height: 60px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.4);
        border-top-color: rgba(255, 255, 255, 0.9);
        top: 12px;
        left: 12px;
        animation: spin 2s linear infinite;
        animation-play-state: paused;
      }
      .playing .vinyl-ring {
        animation-play-state: running;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Song info */
      .song-info {
        text-align: center;
        margin-top: 16px;
      }
      .song-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
      }
      .artist-name {
        font-size: 13px;
        color: var(--green-mid);
        text-decoration: underline;
        margin-top: 4px;
        cursor: pointer;
      }

      /* Progress bar */
      .progress-section {
        padding: 12px 32px 4px;
      }
      .progress-bar {
        width: 100%;
        height: 5px;
        background: #e0e0e0;
        border-radius: 99px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--green-mid),
          var(--green-bright)
        );
        border-radius: 99px;
        width: 50%;
        transition: width 0.3s linear;
      }
      .time-labels {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: var(--muted);
        margin-top: 6px;
      }

      /* Controls */
      .controls {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 32px;
        padding: 16px 0 20px;
      }
      .ctrl-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-size: 28px;
        color: var(--green-mid);
        transition:
          transform 0.15s,
          color 0.15s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .ctrl-btn:hover {
        transform: scale(1.15);
        color: var(--green-dark);
      }
      .ctrl-btn:active {
        transform: scale(0.92);
      }

      .play-btn {
        width: 60px;
        height: 60px;
        border-radius: 50%;
        background: linear-gradient(
          135deg,
          var(--green-mid),
          var(--green-bright)
        );
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
        box-shadow: 0 6px 20px rgba(45, 106, 79, 0.45);
        transition:
          transform 0.15s,
          box-shadow 0.15s;
      }
      .play-btn:hover {
        transform: scale(1.08);
        box-shadow: 0 8px 28px rgba(45, 106, 79, 0.55);
      }
      .play-btn:active {
        transform: scale(0.94);
      }

      /* Location card */
      .location-card {
        margin: 0 20px;
        background: var(--green-dark);
        border-radius: 16px;
        padding: 16px 20px;
        color: white;
      }
      .location-date {
        font-size: 13px;
        opacity: 0.85;
        font-weight: 300;
      }
      .location-name {
        font-size: 15px;
        font-weight: 700;
        margin-top: 2px;
      }

      /* Memo */
      .memo-section {
        padding: 16px 24px 20px;
      }
      .memo-text {
        font-size: 14px;
        color: var(--text);
        line-height: 1.7;
        border-bottom: 1.5px solid var(--green-light);
        padding-bottom: 8px;
      }

      /* Volume slider */
      .volume-section {
        padding: 0 28px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .vol-icon {
        font-size: 16px;
        color: var(--muted);
      }
      .volume-slider {
        flex: 1;
        -webkit-appearance: none;
        height: 4px;
        border-radius: 99px;
        background: #e0e0e0;
        outline: none;
        cursor: pointer;
      }
      .volume-slider::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--green-mid);
        cursor: pointer;
      }

      /* Bottom nav */
      .bottom-nav {
        display: flex;
        justify-content: space-around;
        padding: 10px 0 14px;
        border-top: 1px solid #f0f0f0;
        background: white;
      }
      .nav-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        font-size: 10px;
        color: var(--muted);
        cursor: pointer;
      }
      .nav-item.active {
        color: var(--green-mid);
      }
      .nav-item .nav-icon {
        font-size: 20px;
      }

      /* Audio visualizer */
      .visualizer {
        display: flex;
        align-items: flex-end;
        justify-content: center;
        gap: 3px;
        height: 28px;
        padding: 0 32px;
        margin-bottom: 6px;
      }
      .bar {
        width: 4px;
        background: linear-gradient(
          to top,
          var(--green-mid),
          var(--green-bright)
        );
        border-radius: 2px;
        height: 4px;
        transition: height 0.1s ease;
      }
      .playing .bar {
        animation: bounce var(--dur) ease-in-out infinite alternate;
      }
      @keyframes bounce {
        from {
          height: 4px;
        }
        to {
          height: var(--h);
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 30px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: rgba(0, 0, 0, 0.75);
        color: white;
        padding: 8px 20px;
        border-radius: 20px;
        font-size: 13px;
        opacity: 0;
        transition:
          opacity 0.3s,
          transform 0.3s;
        pointer-events: none;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    </style>
  </head>
  <body>
    <div class="phone" id="player">
      <div class="status-bar">
        <span>9:41</span>
        <span>📶 🔋</span>
      </div>

      <div class="nav-bar">
        <span class="back">‹</span>
        <span class="title">이 장소의 플레이리스트</span>
        <span class="icons">🔍 🔔</span>
      </div>

      <div class="album-section">
        <div class="album-art" id="albumArt">
          <div class="vinyl-ring"></div>
          <div class="flower">🌼</div>
          <div class="album-title">FULL<br />BL🌸M</div>
        </div>
        <div class="song-info">
          <div class="song-title">사라진 기억 (Remember)</div>
          <div class="artist-name">펀치</div>
        </div>
      </div>

      <!-- Visualizer -->
      <div class="visualizer" id="visualizer">
        <!-- bars inserted by JS -->
      </div>

      <div class="progress-section">
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-labels">
          <span id="currentTime">0:00</span>
          <span id="totalTime">0:00</span>
        </div>
      </div>

      <div class="controls">
        <button class="ctrl-btn" id="prevBtn" title="이전">⏮</button>
        <button class="play-btn" id="playBtn" title="재생/일시정지">▶</button>
        <button class="ctrl-btn" id="nextBtn" title="다음">⏭</button>
      </div>

      <div class="volume-section">
        <span class="vol-icon">🔈</span>
        <input
          type="range"
          class="volume-slider"
          id="volumeSlider"
          min="0"
          max="1"
          step="0.01"
          value="0.7"
        />
        <span class="vol-icon">🔊</span>
      </div>

      <div class="location-card">
        <div class="location-date">2022.06.25</div>
        <div class="location-name">스타벅스 대구중앙로역점</div>
      </div>

      <div class="memo-section">
        <div class="memo-text">
          오늘도 평범한 하루를 보내고 커피 한 잔하며<br />하루를 마무리 했다~
        </div>
      </div>

      <div class="bottom-nav">
        <div class="nav-item">
          <span class="nav-icon">🏠</span><span>홈</span>
        </div>
        <div class="nav-item active">
          <span class="nav-icon">🎵</span><span>무드뮤직</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">😊</span><span>무드기록</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">🖼</span><span>아카이브</span>
        </div>
        <div class="nav-item">
          <span class="nav-icon">👤</span><span>마이페이지</span>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      // ─── 오디오 세팅 ───────────────────────────────────────────────
      // 무료 공개 음원 (Wikimedia / Free Music Archive)
      // 자신의 음원 파일로 교체하려면 아래 src를 바꾸세요.
      const tracks = [
        {
          title: "사라진 기억 (Remember)",
          artist: "펀치",
          // 무료 샘플 - Bensound "Sunny"
          src: "https://www.bensound.com/bensound-music/bensound-sunny.mp3",
          date: "2022.06.25",
          place: "스타벅스 대구중앙로역점",
          memo: "오늘도 평범한 하루를 보내고 커피 한 잔하며\n하루를 마무리 했다~",
        },
        {
          title: "Acoustic Breeze",
          artist: "Bensound",
          src: "https://www.bensound.com/bensound-music/bensound-acousticbreeze.mp3",
          date: "2022.07.03",
          place: "스타벅스 동성로점",
          memo: "비 오는 날 창가에 앉아 여유롭게 🌧",
        },
        {
          title: "Creative Minds",
          artist: "Bensound",
          src: "https://www.bensound.com/bensound-music/bensound-creativeminds.mp3",
          date: "2022.07.15",
          place: "카페 봄",
          memo: "새로운 아이디어가 떠오른 날 ✨",
        },
      ];

      let currentIndex = 0;
      let isPlaying = false;
      let audio = new Audio();
      audio.volume = 0.7;
      audio.crossOrigin = "anonymous";

      // ─── Web Audio API 비주얼라이저 ──────────────────────────────
      let audioCtx, analyser, source, dataArray;

      function setupAnalyser() {
        if (audioCtx) return;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        source = audioCtx.createMediaElementSource(audio);
        source.connect(analyser);
        analyser.connect(audioCtx.destination);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
      }

      // ─── 비주얼라이저 바 생성 ───────────────────────────────────
      const vizEl = document.getElementById("visualizer");
      const BAR_COUNT = 20;
      const bars = [];
      for (let i = 0; i < BAR_COUNT; i++) {
        const b = document.createElement("div");
        b.className = "bar";
        vizEl.appendChild(b);
        bars.push(b);
      }

      function animateBars() {
        if (!isPlaying) {
          bars.forEach((b) => (b.style.height = "4px"));
          return;
        }
        if (analyser) {
          analyser.getByteFrequencyData(dataArray);
          bars.forEach((b, i) => {
            const val =
              dataArray[Math.floor((i * dataArray.length) / BAR_COUNT)];
            const h = Math.max(4, Math.floor((val / 255) * 26));
            b.style.height = h + "px";
          });
        } else {
          // fallback: random bounce
          bars.forEach((b) => {
            const h = Math.random() * 22 + 4;
            b.style.height = h + "px";
          });
        }
        requestAnimationFrame(animateBars);
      }

      // ─── UI 업데이트 ───────────────────────────────────────────
      function loadTrack(idx) {
        const t = tracks[idx];
        audio.src = t.src;
        document.querySelector(".song-title").textContent = t.title;
        document.querySelector(".artist-name").textContent = t.artist;
        document.querySelector(".location-date").textContent = t.date;
        document.querySelector(".location-name").textContent = t.place;
        document.querySelector(".memo-text").innerHTML = t.memo.replace(
          "\n",
          "<br>",
        );
        document.getElementById("progressFill").style.width = "0%";
        document.getElementById("currentTime").textContent = "0:00";
        document.getElementById("totalTime").textContent = "0:00";
      }

      function formatTime(sec) {
        if (isNaN(sec)) return "0:00";
        const m = Math.floor(sec / 60);
        const s = Math.floor(sec % 60);
        return `${m}:${s.toString().padStart(2, "0")}`;
      }

      // ─── 재생/일시정지 ─────────────────────────────────────────
      const playBtn = document.getElementById("playBtn");
      const albumArt = document.getElementById("albumArt");

      playBtn.addEventListener("click", async () => {
        // iOS/Safari: AudioContext는 사용자 제스처 후 시작
        try {
          setupAnalyser();
        } catch (e) {}

        if (audio.paused) {
          try {
            if (audioCtx && audioCtx.state === "suspended")
              await audioCtx.resume();
            await audio.play();
            isPlaying = true;
            playBtn.textContent = "⏸";
            albumArt.classList.add("playing");
            animateBars();
          } catch (e) {
            showToast("재생 오류: CORS 또는 네트워크 문제");
            console.error(e);
          }
        } else {
          audio.pause();
          isPlaying = false;
          playBtn.textContent = "▶";
          albumArt.classList.remove("playing");
        }
      });

      // ─── 이전/다음 ─────────────────────────────────────────────
      document.getElementById("prevBtn").addEventListener("click", () => {
        currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
        loadTrack(currentIndex);
        if (isPlaying) audio.play().catch(() => {});
        showToast(tracks[currentIndex].title);
      });

      document.getElementById("nextBtn").addEventListener("click", () => {
        currentIndex = (currentIndex + 1) % tracks.length;
        loadTrack(currentIndex);
        if (isPlaying) audio.play().catch(() => {});
        showToast(tracks[currentIndex].title);
      });

      // ─── 진행바 업데이트 ───────────────────────────────────────
      audio.addEventListener("timeupdate", () => {
        if (!audio.duration) return;
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progressFill").style.width = pct + "%";
        document.getElementById("currentTime").textContent = formatTime(
          audio.currentTime,
        );
        document.getElementById("totalTime").textContent = formatTime(
          audio.duration,
        );
      });

      audio.addEventListener("ended", () => {
        currentIndex = (currentIndex + 1) % tracks.length;
        loadTrack(currentIndex);
        audio.play().catch(() => {});
        showToast(tracks[currentIndex].title);
      });

      // ─── 진행바 클릭으로 탐색 ─────────────────────────────────
      document.getElementById("progressBar").addEventListener("click", (e) => {
        if (!audio.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const ratio = (e.clientX - rect.left) / rect.width;
        audio.currentTime = ratio * audio.duration;
      });

      // ─── 볼륨 ─────────────────────────────────────────────────
      document.getElementById("volumeSlider").addEventListener("input", (e) => {
        audio.volume = e.target.value;
      });

      // ─── Toast 알림 ───────────────────────────────────────────
      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        setTimeout(() => t.classList.remove("show"), 2000);
      }

      // 초기 트랙 로드
      loadTrack(0);
    </script>
  </body>
</html>
