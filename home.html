<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <div class="header-contents">
          <a href="home.html">
            <div class="logo">
              <img src="assets/icons/svg/header-logo.svg" alt="" />
            </div>
          </a>

          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <i class="fa-solid fa-magnifying-glass"></i></div
            ></a>
            <a href=""><i class="fa-regular fa-bell"></i></a>
          </div>
        </div>
      </div>

      <section class="home">
        <!-- 배너 부분 -->
        <div class="container">
          <div class="banner-swiper-wrap">
            <div class="swiper banner-swiper">
              <div class="swiper-wrapper home-banner">
                <div class="swiper-slide">
                  <p class="banner-title">
                    좋았던 기억의 장소를 <br />
                    다른 사용자들에게 추천해보세요
                  </p>
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
                <div class="swiper-slide">
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
                <div class="swiper-slide">
                  <img src="assets/images/banner-img-1.png" alt="" />
                </div>
              </div>
              <!-- <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div> -->
              <div class="swiper-pagination"></div>
            </div>
          </div>
          <div class="record-mood-container">
            <a
              href="mood-archive.html"
              class="mood-archive-btn"
              id="moodArchiveBtn"
            >
              <div class="mood-archive-text btn-text">
                <p class="title">무드 아카이브</p>
                <p class="sub-title">내가 기록했던 장소의 감정을 모아보세요</p>
              </div>
              <div class="card-container" id="cardAnimation">
                <img
                  src="assets/icons/svg/mood-archive-card-3.svg"
                  alt=""
                  class="card card3"
                />
                <img
                  src="assets/icons/svg/mood-archive-card-2.svg"
                  alt=""
                  class="card card2"
                />
                <img
                  src="assets/icons/svg/mood-archive-card-1.svg"
                  alt=""
                  class="card card1"
                />
              </div>
            </a>
            <a href="record-mood.html" class="mood-record-btn">
              <div class="mood-archive-text btn-text">
                <p class="title">무드 기록하기</p>
                <p class="sub-title">
                  지금 장소에서 느낀 감정을 자유롭게 적어보세요
                </p>
                <div class="mood-record-img">
                  <img src="assets/icons/svg/mood-charater.png" alt="" />
                </div>
              </div>
              <div class="card-container" id="cardAnimation"></div>
            </a>
          </div>
          <div class="recommend-place-container">
            <div class="place-title-top">
              <h3 class="title">주변 추천 플레이스</h3>
              <a href="recommend-place.html"
                ><i class="fa-solid fa-angle-right"></i
              ></a>
            </div>
            <div class="place-title-botom">
              <span class="sub-title"
                >다른 사람들이 남긴 장소와 감정을 공유해보세요
              </span>
            </div>
            <div class="place-preview"></div>
          </div>
          <div class="mood-community"></div>

          <!-- <button class="btn">로그인 하기</button> -->
        </div>
      </section>
      <div class="bottom-nav">
        <div class="bottom-nav-container">
          <a href="home.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-home.svg" alt="홈 비활성화" />
              <span>홈</span>
            </div>
          </a>
          <a href="mood-music.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-music.svg"
                alt="무드뮤직 비활성화"
              />
              <span>무드뮤직</span>
            </div>
          </a>
          <a href="record-mood.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-record.svg"
                alt="무드기록 비활성화"
              />
              <span>무드기록</span>
            </div>
          </a>
          <a href="mood-archive.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-archive.svg"
                alt="아카이브 비활성화"
              />
              <span>아카이브</span>
            </div>
          </a>
          <a href="mypage.html">
            <div class="nav-item">
              <img
                src="assets/icons/svg/dis-mypage.svg"
                alt="마이페이지 비활성화"
              />
              <span class="nav-text">마이페이지</span>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
