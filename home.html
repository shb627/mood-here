<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <div class="header-container">
          <a href="home.html">
            <div class="logo">
              <img src="assets/icons/header-logo.svg" alt="" />
            </div>
          </a>
          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <img src="assets/icons/search.png" alt="" /></div
            ></a>
            <a href=""><img src="assets/icons/alram.png" alt="" /></a>
          </div>
        </div>
      </header>
      <main class="container">
        <!-- 배너 부분 -->
        <div class="home-container">
          <div class="swiper banner-swiper">
            <div class="swiper-wrapper home-banner">
              <div class="swiper-slide">
                <h2 class="banner-title">
                  좋았던 기억의 장소를 <br />
                  다른 사용자들에게 추천해보세요
                </h2>
                <img src="assets/images/banner-img-1.png" alt="" />
              </div>
              <div class="swiper-slide">
                <img src="assets/images/banner-img-1.png" alt="" />
              </div>
              <div class="swiper-slide">
                <img src="assets/images/banner-img-1.png" alt="" />
              </div>
            </div>
            <!-- <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div> -->
            <div class="swiper-pagination"></div>
          </div>
          <div class="record-mood-container">
            <div class="mood-archive"></div>
            <div class="mood-record"></div>
          </div>
          <div class="recommend-place-container"></div>
          <div class="recommend-music"></div>

          <!-- <button class="btn">로그인 하기</button> -->
        </div>
      </main>
      <footer class="footer"></footer>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
