<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>
    <link rel="icon" href="assets/icons/svg/moodhere-fabicon.ico" />

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/moodmusic.css" />

    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/pages/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <div class="header">
        <div class="header-contents">
          <div type="button" class="back-btn" id="backBtn">
            <i class="fa-solid fa-angle-left"></i>
          </div>
          <div class="header-title">
            <p>무드 뮤직</p>
          </div>
          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <i class="fa-solid fa-magnifying-glass"></i></div
            ></a>
            <a href=""><i class="fa-regular fa-bell"></i></a>
          </div>
        </div>
      </div>
      <section>
        <div class="container">
          <main class="muisc-page-container">
            <div class="player-container" id="player">
              <div class="album-container">
                <img src="assets/images/full-bloom-album.jpg" alt="" />
              </div>

              <div class="music-title"><h3>사라진 기억</h3></div>
              <div class="music-singer"><span>펀치</span></div>
              <!-- Visualizer -->
              <!-- <div class="visualizer" id="visualizer"> -->
              <!-- bars inserted by JS -->
              <!-- </div> -->

              <div class="progress-section">
                <div class="progress-bar" id="progressBar">
                  <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="time-labels">
                  <span id="currentTime">0:00</span>
                  <span id="totalTime">0:00</span>
                </div>
              </div>

              <div class="controls">
                <button class="ctrl-btn" id="prevBtn" title="이전">
                  <i class="fa-solid fa-angles-left"></i>
                </button>
                <i
                  class="fa-solid fa-circle-play play-btn"
                  id="playBtn"
                  title="재생"
                ></i>
                <!-- <i class="fa-solid fa-circle-pause"></i> -->
                <button class="ctrl-btn" id="nextBtn" title="다음">
                  <i class="fa-solid fa-angles-right"></i>
                </button>
              </div>

              <!-- <div class="volume-section">
            <span class="vol-icon">🔈</span>
            <input
              type="range"
              class="volume-slider"
              id="volumeSlider"
              min="0"
              max="1"
              step="0.01"
              value="0.7"
            />
            <span class="vol-icon">🔊</span>
          </div> -->
            </div>
            <div class="music-memo">
              <div class="location-card">
                <div class="location-date-container">
                  <div class="location-date">2026.06.27</div>
                  <img
                    src="assets/icons/feel-peace.svg"
                    class="location-date-img"
                    alt=""
                  />
                </div>
                <div class="location-name">스타벅스 대구중앙로역점</div>
              </div>

              <div class="memo-contianer">
                <div class="memo-text">
                  오늘도 평범한 하루를 보내고 커피 한 잔하며<br />하루를 마무리
                  했다~
                </div>
              </div>
            </div>
          </main>
        </div>
      </section>
      <div class="bottom-nav">
        <div class="bottom-nav-container">
          <a href="home.html" data-page="home.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-home.svg" />
              <span>홈</span>
            </div>
          </a>

          <a href="mood-music.html" data-page="mood-music.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-music.svg" />
              <span>무드뮤직</span>
            </div>
          </a>

          <a href="record-mood.html" data-page="record-mood.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-record.svg" />
              <span>무드기록</span>
            </div>
          </a>

          <a href="mood-archive.html" data-page="mood-archive.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-archive.svg" />
              <span>아카이브</span>
            </div>
          </a>

          <a href="mypage.html" data-page="mypage.html">
            <div class="nav-item">
              <img src="assets/icons/svg/dis-mypage.svg" />
              <span>마이페이지</span>
            </div>
          </a>
        </div>
      </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
