<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mood here</title>

    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/style.css" />
    <script
      src="https://kit.fontawesome.com/bd66e01c7b.js"
      crossorigin="anonymous"
    ></script>
    <!-- Link Swiper's CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <script src="js/script.js" defer></script>
  </head>
  <body>
    <div class="layout">
      <header class="header">
        <div class="header-container">
          <a href="home.html">
            <div class="logo">
              <img src="assets/icons/header-logo.svg" alt="" />
            </div>
          </a>
          <div class="user-menu">
            <a href="">
              <div class="searchicon">
                <img src="assets/icons/search.png" alt="" /></div
            ></a>
            <a href=""><img src="assets/icons/alram.png" alt="" /></a>
          </div>
        </div>
      </header>
      <main class="container">
        <div class="phone" id="player">
          <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋</span>
          </div>

          <div class="nav-bar">
            <span class="back">‹</span>
            <span class="title">이 장소의 플레이리스트</span>
            <span class="icons">🔍 🔔</span>
          </div>

          <div class="album-section">
            <div class="album-art" id="albumArt">
              <div class="vinyl-ring"></div>
              <div class="flower">🌼</div>
              <div class="album-title">FULL<br />BL🌸M</div>
            </div>
            <div class="song-info">
              <div class="song-title">사라진 기억 (Remember)</div>
              <div class="artist-name">펀치</div>
            </div>
          </div>

          <!-- Visualizer -->
          <div class="visualizer" id="visualizer">
            <!-- bars inserted by JS -->
          </div>

          <div class="progress-section">
            <div class="progress-bar" id="progressBar">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="time-labels">
              <span id="currentTime">0:00</span>
              <span id="totalTime">0:00</span>
            </div>
          </div>

          <div class="controls">
            <button class="ctrl-btn" id="prevBtn" title="이전">⏮</button>
            <button class="play-btn" id="playBtn" title="재생/일시정지">
              ▶
            </button>
            <button class="ctrl-btn" id="nextBtn" title="다음">⏭</button>
          </div>

          <div class="volume-section">
            <span class="vol-icon">🔈</span>
            <input
              type="range"
              class="volume-slider"
              id="volumeSlider"
              min="0"
              max="1"
              step="0.01"
              value="0.7"
            />
            <span class="vol-icon">🔊</span>
          </div>

          <div class="location-card">
            <div class="location-date">2022.06.25</div>
            <div class="location-name">스타벅스 대구중앙로역점</div>
          </div>

          <div class="memo-section">
            <div class="memo-text">
              오늘도 평범한 하루를 보내고 커피 한 잔하며<br />하루를 마무리
              했다~
            </div>
          </div>

          <div class="bottom-nav">
            <div class="nav-item">
              <span class="nav-icon">🏠</span><span>홈</span>
            </div>
            <div class="nav-item active">
              <span class="nav-icon">🎵</span><span>무드뮤직</span>
            </div>
            <div class="nav-item">
              <span class="nav-icon">😊</span><span>무드기록</span>
            </div>
            <div class="nav-item">
              <span class="nav-icon">🖼</span><span>아카이브</span>
            </div>
            <div class="nav-item">
              <span class="nav-icon">👤</span><span>마이페이지</span>
            </div>
          </div>
        </div>

        <div class="toast" id="toast"></div>
      </main>
      <footer class="footer"></footer>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
